global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: sswai

scrape_configs:
  - job_name: vllm-workers
    static_configs:
      - targets:
          - model-0:8000
          - model-1:8000
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):\d+'
        target_label: instance
        replacement: '$1'

  - job_name: masheen
    static_configs:
      - targets:
          - 10.200.0.2:8001
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'masheen'
