# SSW AI Inference — Qwen3-30B-A3B MoE AWQ, 1 worker per GPU
#
# GPU layout:
#   GPU 0: model-0 (:8001)  0.90 gpu-mem-util (~17GB weights, ~26GB KV)
#   GPU 1: model-1 (:8002)  0.90 gpu-mem-util (~17GB weights, ~26GB KV)
#
# MoE: 30B total params, 3B active per token — fast inference.
# Both "light" and "heavy" aliases route to both workers.
# Context: 32,768 tokens (native 128K, capped for KV headroom).
#
# Usage:
#   docker compose -p sswai -f docker-compose.30b-moe.yml --env-file .env.30b-moe up -d

x-model-worker: &model-worker
  image: vllm/vllm-openai:latest
  command:
    - --model=/models/${PRIMARY_MODEL}
    - --served-model-name=light
    - --port=8000
    - --gpu-memory-utilization=${PRIMARY_GPU_MEMORY_UTILIZATION}
    - --max-model-len=${VLLM_MAX_MODEL_LEN}
    - --max-num-seqs=${VLLM_MAX_NUM_SEQS:-64}
    - --max-num-batched-tokens=${VLLM_MAX_NUM_BATCHED_TOKENS:-32768}
    - --tool-call-parser=${VLLM_TOOL_CALL_PARSER}
    - --enable-auto-tool-choice
    - --dtype=${PRIMARY_DTYPE:-half}
    - --quantization=${PRIMARY_QUANTIZATION:-awq_marlin}
  volumes:
    - ${MODEL_REPO}:/models:ro
  depends_on:
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 20
    start_period: 300s
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  model-0:
    <<: *model-worker
    ports:
      - "127.0.0.1:${MODEL_0_PORT:-8001}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  model-1:
    <<: *model-worker
    ports:
      - "127.0.0.1:${MODEL_1_PORT:-8002}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  gateway:
    build: ./gateway
    ports:
      - "0.0.0.0:${GATEWAY_PORT:-8000}:8000"
    volumes:
      - ${MODEL_REPO}:/models:ro
      - ./gateway/models.30b-moe.yaml:/app/models.yaml:ro
    environment:
      - GATEWAY_HEAVY_WORKERS=
      - GATEWAY_LIGHT_WORKERS=http://model-0:8000,http://model-1:8000
      - GATEWAY_REDIS_URL=redis://redis:6379/0
      - GATEWAY_MODELS_DIR=/models
      - GATEWAY_MODELS_YAML_PATH=/app/models.yaml
      - GATEWAY_LOADER_URL=http://loader:8001
    depends_on:
      redis:
        condition: service_healthy
      model-0:
        condition: service_healthy
      model-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  loader:
    build: ./loader
    ports:
      - "127.0.0.1:${LOADER_PORT:-8011}:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MODEL_REPO}:/models:ro
      - ./gateway/models.30b-moe.yaml:/app/models.yaml:ro
    environment:
      - LOADER_GATEWAY_URL=http://gateway:8000
      - LOADER_MODELS_DIR=/models
      - LOADER_MODELS_YAML_PATH=/app/models.yaml
      - LOADER_DOCKER_NETWORK=${LOADER_DOCKER_NETWORK:-sswai_default}
      - LOADER_VLLM_IMAGE=vllm/vllm-openai:latest
      - LOADER_PORT_START=9000
      - LOADER_PORT_END=9099
      - LOADER_NUM_GPUS=2
      - LOADER_CONTAINER_PREFIX=${LOADER_CONTAINER_PREFIX:-ssw}
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  redis-data:
